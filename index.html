  <style>
        html, body {
            height: 100%;
            width: 100%;
        }

        * {
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e3f2fd 50%, #f3e5f5 100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.45);
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
        }

        .btn-secondary:hover::before {
            left: 100%;
        }

        .btn-secondary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(124, 58, 237, 0.45);
            background: linear-gradient(135deg, #6d28d9 0%, #5b21b6 100%);
        }

        .container-main {
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #messageBox {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #messageBox.show {
            opacity: 1;
        }
    </style>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap');

  #site-navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 99999;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;

    /* زجاج مميز */
    background: rgba(10, 14, 30, 0.72);
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* خط متوهج في الأسفل */
  #site-navbar::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #a855f7 30%, #3b82f6 70%, transparent);
    opacity: 0.6;
  }

  /* الشعار */
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .nav-brand-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #a855f7, #3b82f6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px rgba(168,85,247,0.5);
    flex-shrink: 0;
  }
  .nav-brand-text {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.3px;
    line-height: 1.1;
  }
  .nav-brand-text span {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
  }

  /* الروابط */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 6px;
    list-style: none;
    margin: 0; padding: 0;
  }
  .nav-links a {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.65);
    transition: all 0.22s ease;
    position: relative;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .nav-links a:hover {
    color: #fff;
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.1);
  }
  .nav-links a.nav-active {
    color: #fff;
    background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(59,130,246,0.25));
    border-color: rgba(168,85,247,0.35);
    box-shadow: 0 0 18px rgba(168,85,247,0.2);
  }
  .nav-links a.nav-active::before {
    content: '';
    position: absolute;
    bottom: -1px; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, #a855f7, #3b82f6);
    border-radius: 2px;
  }
  .nav-icon { font-size: 15px; }

  /* زر هامبرغر للجوال */
  #nav-toggle {
    display: none;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    width: 38px; height: 38px;
    cursor: pointer;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 0;
    flex-shrink: 0;
  }
  #nav-toggle span {
    display: block;
    width: 18px; height: 2px;
    background: rgba(255,255,255,0.8);
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  #nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  #nav-toggle.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  #nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* قائمة الجوال */
  #nav-mobile {
    display: none;
    position: fixed;
    top: 62px; left: 0; right: 0;
    background: rgba(10, 14, 30, 0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 16px 16px;
    z-index: 99998;
    flex-direction: column;
    gap: 6px;
    animation: slideDown 0.25s ease;
  }
  #nav-mobile.open { display: flex; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #nav-mobile a {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.7);
    border: 1px solid transparent;
    transition: all 0.2s;
    font-family: 'Tajawal', sans-serif;
  }
  #nav-mobile a:hover { color: #fff; background: rgba(255,255,255,0.06); }
  #nav-mobile a.nav-active {
    color: #fff;
    background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(59,130,246,0.2));
    border-color: rgba(168,85,247,0.3);
  }

  /* تعويض ارتفاع الشريط */
  body { padding-top: 62px !important; }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    #nav-toggle { display: flex; }
    .nav-brand-text span { display: none; }
  }
</style>

  <a href="/t" class="nav-link-item" data-page="t"><span>📚</span> تحضير الدروس</a>
  <a href="/m" class="nav-link-item" data-page="m"><span>🎮</span> المنصة التعليمية</a>
</div>

<script>
  (function(){
    // تحديد الصفحة النشطة
    const path = window.location.pathname.replace(/\/$/, '') || '/';
    const pageMap = { '/': 'home', '/t': 't', '/m': 'm' };
    const activePage = pageMap[path] || 'home';
    document.querySelectorAll('.nav-link-item').forEach(function(a){
      if(a.dataset.page === activePage) a.classList.add('nav-active');
    });
  })();

  function toggleMobileNav() {
    var btn = document.getElementById('nav-toggle');
    var menu = document.getElementById('nav-mobile');
    btn.classList.toggle('open');
    menu.classList.toggle('open');
  }

  // إغلاق القائمة عند النقر خارجها
  document.addEventListener('click', function(e){
    var menu = document.getElementById('nav-mobile');
    var btn = document.getElementById('nav-toggle');
    if(menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)){
      menu.classList.remove('open');
      btn.classList.remove('open');
    }
  });
</script>

            document.getElementById('btn1').textContent = config.button1_text || defaultConfig.button1_text;
            document.getElementById('btn2').textContent = config.button2_text || defaultConfig.button2_text;
        }

        function showMessage(buttonName) {
            const messageBox = document.getElementById('messageBox');
            const messageText = document.getElementById('messageText');
            messageText.textContent = `لقد اخترت: ${buttonName}`;
            messageBox.classList.add('show');

            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 3000);
        }

        initializeSDK();
