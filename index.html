<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة التعليم والدروس</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
        html, body {
            height: 100%;
            width: 100%;
        }

        * {
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e3f2fd 50%, #f3e5f5 100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.45);
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
        }

        .btn-secondary:hover::before {
            left: 100%;
        }

        .btn-secondary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(124, 58, 237, 0.45);
            background: linear-gradient(135deg, #6d28d9 0%, #5b21b6 100%);
        }

        .container-main {
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #messageBox {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #messageBox.show {
            opacity: 1;
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full flex items-center justify-center">
  <div class="container-main text-center px-6 w-full">
   <h1 id="mainTitle" class="title text-4xl md:text-5xl font-bold text-gray-800 mb-4">مرحباً بك</h1>
   <p id="subtitle" class="text-gray-600 text-lg md:text-xl mb-12 opacity-95">اختر ما يناسبك من القائمة</p>
   <div class="flex flex-col sm:flex-row gap-6 justify-center mb-12"><a href="/t" class="btn-primary px-8 py-4 rounded-lg text-white font-bold text-lg hover:shadow-lg transition-all" id="btn1">التحضير الذكي</a> <a href="/m" class="btn-secondary px-8 py-4 rounded-lg text-white font-bold text-lg hover:shadow-lg transition-all" id="btn2">المنصة التعليمية</a>
   </div>
   <div class="bg-yellow-50 border-2 border-yellow-400 rounded-lg p-4 mt-24 inline-block max-w-md">
    <p class="text-yellow-800 font-bold text-sm md:text-base">📌 ملاحظة مهمة: استعمل متصفح Google Chrome للحصول على أفضل النتائج</p>
   </div>
   <div id="messageBox" class="mt-12">
    <p id="messageText" class="text-gray-700 text-lg font-semibold"></p>
   </div>
  </div>
  <script>
        const defaultConfig = {
            main_title: "مرحباً بك",
            subtitle: "اختر ما يناسبك من القائمة",
            button1_text: "تحضير الدروس",
            button2_text: "المنصة التعليمية"
        };

        let config = { ...defaultConfig };

        const dataHandler = {
            onConfigChange(newConfig) {
                config = { ...config, ...newConfig };
            }
        };

        async function initializeSDK() {
            if (window.elementSdk) {
                window.elementSdk.init({
                    defaultConfig,
                    onConfigChange: updateUI,
                    mapToCapabilities: () => ({
                        recolorables: [],
                        borderables: [],
                        fontEditable: undefined,
                        fontSizeable: undefined
                    }),
                    mapToEditPanelValues: (cfg) => new Map([
                        ["main_title", cfg.main_title || defaultConfig.main_title],
                        ["subtitle", cfg.subtitle || defaultConfig.subtitle],
                        ["button1_text", cfg.button1_text || defaultConfig.button1_text],
                        ["button2_text", cfg.button2_text || defaultConfig.button2_text]
                    ])
                });
            }
        }

        function updateUI(newConfig) {
            config = { ...config, ...newConfig };
            document.getElementById('mainTitle').textContent = config.main_title || defaultConfig.main_title;
            document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
            document.getElementById('btn1').textContent = config.button1_text || defaultConfig.button1_text;
            document.getElementById('btn2').textContent = config.button2_text || defaultConfig.button2_text;
        }

        function showMessage(buttonName) {
            const messageBox = document.getElementById('messageBox');
            const messageText = document.getElementById('messageText');
            messageText.textContent = `لقد اخترت: ${buttonName}`;
            messageBox.classList.add('show');

            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 3000);
        }

        initializeSDK();
    </script>
