<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المدير | التحضير الذكي</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg2: #1e293b;
      --card: #ffffff;
      --txt: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      background: radial-gradient(1000px 500px at 10% -10%, #60a5fa 0%, transparent 60%), linear-gradient(145deg, var(--bg), var(--bg2));
      min-height: 100vh;
      color: #e2e8f0;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
    .top {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .title { margin: 0; font-size: 1.3rem; font-weight: 800; }
    .top-actions { display: flex; gap: 8px; }
    .btn {
      border: 0; border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-light { background: #fff; color: #0f172a; }
    .btn-outline { background: transparent; color: #fff; border: 1px solid #94a3b8; }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 14px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: var(--card);
      color: var(--txt);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 12px 30px rgba(2, 6, 23, .2);
    }
    .panel h2 { margin: 0 0 10px; font-size: 1.05rem; }
    .row { margin-bottom: 10px; }
    label { display: block; margin-bottom: 6px; color: #334155; font-size: .88rem; font-weight: 700; }
    input, select, textarea {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font-size: .95rem; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #60a5fa; }
    .accounts { max-height: 62vh; overflow: auto; padding-right: 4px; }
    .account-item {
      width: 100%; text-align: right; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; background: #fff; cursor: pointer;
      margin-bottom: 8px;
    }
    .account-item.active { border-color: #2563eb; background: #eff6ff; }
    .account-item h4 { margin: 0 0 4px; font-size: .96rem; color: #0f172a; }
    .account-item p { margin: 0; font-size: .82rem; color: #475569; }
    .msg { min-height: 22px; font-weight: 700; font-size: .92rem; margin-top: 6px; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--danger); }
    .hidden { display: none !important; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .entry-card {
      border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; margin-bottom: 8px; background: #f8fafc;
    }
    .entry-card h5 { margin: 0 0 5px; font-size: .9rem; color: #0f172a; }
    .entry-card p { margin: 0; font-size: .8rem; color: #475569; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 class="title">لوحة مدير الإنجاز الرقمي</h1>
      <div class="top-actions">
        <button class="btn btn-outline" type="button" id="go-enjazy-btn">العودة لملف الإنجاز</button>
      </div>
    </div>

    <div id="login-panel" class="panel">
      <h2>تسجيل دخول المدير</h2>
      <div class="row">
        <label for="admin-password">كلمة مرور المدير</label>
        <input id="admin-password" type="password" placeholder="أدخل ADMIN_PASSWORD" />
      </div>
      <button id="admin-login-btn" class="btn btn-primary" type="button">دخول</button>
      <div id="login-msg" class="msg"></div>
    </div>

    <div id="admin-panel" class="grid hidden">
      <aside class="panel">
        <h2>الحسابات</h2>
        <div class="row">
          <label for="search-input">بحث</label>
          <input id="search-input" type="text" placeholder="اسم أو بريد" />
        </div>
        <div class="actions" style="margin-bottom:10px;">
          <button id="refresh-btn" class="btn btn-light" type="button">تحديث</button>
          <button id="logout-btn" class="btn btn-danger" type="button">تسجيل خروج</button>
        </div>
        <div id="accounts-list" class="accounts"></div>
      </aside>

      <section class="panel">
        <h2>تفاصيل الحساب</h2>
        <div id="empty-account" class="msg">اختر حسابًا من القائمة لعرض التفاصيل.</div>
        <div id="details-panel" class="hidden">
          <div class="row">
            <label>المعرف</label>
            <input id="edit-user-id" type="text" readonly />
          </div>
          <div class="row">
            <label for="edit-name">الاسم</label>
            <input id="edit-name" type="text" />
          </div>
          <div class="row">
            <label for="edit-contact">البريد</label>
            <input id="edit-contact" type="email" />
          </div>
          <div class="row">
            <label for="edit-school">المدرسة</label>
            <input id="edit-school" type="text" />
          </div>
          <div class="row">
            <label for="edit-subject">المادة</label>
            <input id="edit-subject" type="text" />
          </div>
          <div class="row">
            <label for="edit-grades">الصفوف</label>
            <input id="edit-grades" type="text" />
          </div>
          <div class="row">
            <label for="edit-theme">الثيم</label>
            <select id="edit-theme">
              <option value="classic">classic</option>
              <option value="ocean">ocean</option>
              <option value="sand">sand</option>
              <option value="night">night</option>
            </select>
          </div>
          <div class="row">
            <label for="edit-new-password">كلمة مرور جديدة (اختياري)</label>
            <input id="edit-new-password" type="password" />
          </div>
          <div class="actions">
            <button id="save-btn" class="btn btn-primary" type="button">حفظ التعديلات</button>
            <button id="delete-btn" class="btn btn-danger" type="button">حذف الحساب</button>
          </div>
          <div id="details-msg" class="msg"></div>
          <hr />
          <h2>مشاركات الحساب</h2>
          <div id="entries-list"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const API_BASE_CANDIDATES = Array.from(new Set(["", "/enjazy"]));
    const ADMIN_SESSION_KEY = "enjazy_admin_session_v1";
    const state = {
      password: "",
      accounts: [],
      filtered: [],
      search: "",
      selectedUserId: "",
      selected: null
    };

    const el = {
      loginPanel: document.getElementById("login-panel"),
      adminPanel: document.getElementById("admin-panel"),
      adminPassword: document.getElementById("admin-password"),
      loginBtn: document.getElementById("admin-login-btn"),
      loginMsg: document.getElementById("login-msg"),
      goEnjazyBtn: document.getElementById("go-enjazy-btn"),
      searchInput: document.getElementById("search-input"),
      refreshBtn: document.getElementById("refresh-btn"),
      logoutBtn: document.getElementById("logout-btn"),
      accountsList: document.getElementById("accounts-list"),
      emptyAccount: document.getElementById("empty-account"),
      detailsPanel: document.getElementById("details-panel"),
      editUserId: document.getElementById("edit-user-id"),
      editName: document.getElementById("edit-name"),
      editContact: document.getElementById("edit-contact"),
      editSchool: document.getElementById("edit-school"),
      editSubject: document.getElementById("edit-subject"),
      editGrades: document.getElementById("edit-grades"),
      editTheme: document.getElementById("edit-theme"),
      editNewPassword: document.getElementById("edit-new-password"),
      saveBtn: document.getElementById("save-btn"),
      deleteBtn: document.getElementById("delete-btn"),
      detailsMsg: document.getElementById("details-msg"),
      entriesList: document.getElementById("entries-list")
    };

    function showLoginMessage(message, ok = false) {
      el.loginMsg.textContent = message || "";
      el.loginMsg.className = `msg ${ok ? "ok" : "err"}`;
    }
    function showDetailsMessage(message, ok = false) {
      el.detailsMsg.textContent = message || "";
      el.detailsMsg.className = `msg ${ok ? "ok" : "err"}`;
    }

    async function fetchApiWithFallback(path, options = {}) {
      let last404 = null;
      let lastError = null;
      for (const base of API_BASE_CANDIDATES) {
        const url = `${base}${path}`;
        try {
          const res = await fetch(url, options);
          if (res.status === 404) {
            last404 = res;
            continue;
          }
          return res;
        } catch (e) {
          lastError = e;
        }
      }
      if (last404) return last404;
      throw (lastError || new Error("network_error"));
    }

    async function apiJson(path, options = {}, requiresAdmin = false) {
      const headers = { ...(options.headers || {}) };
      if (requiresAdmin) headers["x-admin-password"] = state.password;
      const res = await fetchApiWithFallback(path, { ...options, headers });
      let body = {};
      try { body = await res.json(); } catch (e) {}
      if (!res.ok) {
        const reason = body?.error || (res.status === 404 ? "endpoint_not_found" : "api_error");
        const message = body?.message || "";
        throw new Error(`${reason}::${message}`);
      }
      return body;
    }

    function setLoggedIn(on) {
      el.loginPanel.classList.toggle("hidden", !!on);
      el.adminPanel.classList.toggle("hidden", !on);
    }

    function normalizeTheme(v) {
      const t = String(v || "").trim().toLowerCase();
      return ["classic", "ocean", "sand", "night"].includes(t) ? t : "classic";
    }

    function fmtDate(v) {
      try { return new Date(v).toLocaleString("ar-OM", { dateStyle: "short", timeStyle: "short" }); }
      catch (e) { return "-"; }
    }

    function renderAccounts() {
      const term = String(state.search || "").trim().toLowerCase();
      state.filtered = state.accounts.filter((a) => {
        const name = String(a?.profile?.name || "").toLowerCase();
        const contact = String(a?.profile?.contact || "").toLowerCase();
        return !term || name.includes(term) || contact.includes(term);
      });
      if (!state.filtered.length) {
        el.accountsList.innerHTML = '<p class="msg">لا توجد نتائج.</p>';
        return;
      }
      el.accountsList.innerHTML = state.filtered.map((a) => `
        <button class="account-item ${state.selectedUserId === a.userId ? "active" : ""}" data-user-id="${String(a.userId || "")}">
          <h4>${String(a?.profile?.name || "بدون اسم")}</h4>
          <p>${String(a?.profile?.contact || "-")}</p>
          <p>المشاركات: ${Number(a.entriesCount || 0)} | تحديث: ${fmtDate(a.updatedAt)}</p>
        </button>
      `).join("");
      el.accountsList.querySelectorAll("[data-user-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const userId = String(btn.getAttribute("data-user-id") || "");
          await loadAccount(userId);
        });
      });
    }

    function renderAccountDetails() {
      const a = state.selected;
      if (!a) {
        el.emptyAccount.classList.remove("hidden");
        el.detailsPanel.classList.add("hidden");
        return;
      }
      el.emptyAccount.classList.add("hidden");
      el.detailsPanel.classList.remove("hidden");
      const p = a.profile || {};
      el.editUserId.value = String(a.userId || "");
      el.editName.value = String(p.name || "");
      el.editContact.value = String(p.contact || "");
      el.editSchool.value = String(p.school || "");
      el.editSubject.value = String(p.subject || "");
      el.editGrades.value = String(p.grades || "");
      el.editTheme.value = normalizeTheme(p.shareTheme || "classic");
      el.editNewPassword.value = "";
      const entries = Array.isArray(a.entries) ? a.entries : [];
      if (!entries.length) {
        el.entriesList.innerHTML = '<p class="msg">لا توجد مشاركات لهذا الحساب.</p>';
      } else {
        el.entriesList.innerHTML = entries.map((e, i) => `
          <div class="entry-card">
            <h5>${i + 1}. ${String(e?.title || "بدون عنوان")}</h5>
            <p>القسم: ${String(e?.section || "-")} | التاريخ: ${fmtDate(e?.createdAt || e?.updatedAt || "")}</p>
          </div>
        `).join("");
      }
    }

    async function loadAccounts() {
      const out = await apiJson("/api/admin?action=accounts", { method: "GET" }, true);
      state.accounts = Array.isArray(out.accounts) ? out.accounts : [];
      renderAccounts();
    }

    async function loadAccount(userId) {
      if (!userId) return;
      const out = await apiJson(`/api/admin?action=account&userId=${encodeURIComponent(userId)}`, { method: "GET" }, true);
      state.selectedUserId = userId;
      state.selected = {
        userId: out.userId,
        profile: out.profile || {},
        entries: Array.isArray(out.entries) ? out.entries : []
      };
      renderAccounts();
      renderAccountDetails();
      showDetailsMessage("", true);
    }

    async function saveAccount() {
      if (!state.selected?.userId) return;
      const profile = {
        name: String(el.editName.value || "").trim(),
        contact: String(el.editContact.value || "").trim(),
        school: String(el.editSchool.value || "").trim(),
        subject: String(el.editSubject.value || "").trim(),
        grades: String(el.editGrades.value || "").trim(),
        shareTheme: normalizeTheme(el.editTheme.value || "classic")
      };
      const newPassword = String(el.editNewPassword.value || "").trim();
      const payload = {
        action: "update_account",
        userId: state.selected.userId,
        profile,
        entries: Array.isArray(state.selected.entries) ? state.selected.entries : []
      };
      if (newPassword) payload.newPassword = newPassword;
      await apiJson("/api/admin?action=update_account", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }, true);
      showDetailsMessage("تم حفظ التعديلات بنجاح.", true);
      await loadAccounts();
      await loadAccount(state.selected.userId);
    }

    async function deleteAccount() {
      if (!state.selected?.userId) return;
      const ok = confirm("هل تريد حذف هذا الحساب نهائيًا؟");
      if (!ok) return;
      await apiJson("/api/admin?action=delete_account", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "delete_account", userId: state.selected.userId })
      }, true);
      state.selected = null;
      state.selectedUserId = "";
      showDetailsMessage("تم حذف الحساب.", true);
      renderAccountDetails();
      await loadAccounts();
    }

    async function runLogin() {
      const password = String(el.adminPassword.value || "");
      if (!password) {
        showLoginMessage("أدخل كلمة المرور أولًا.");
        return;
      }
      await apiJson("/api/admin?action=login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "login", password })
      }, false);
      state.password = password;
      sessionStorage.setItem(ADMIN_SESSION_KEY, password);
      setLoggedIn(true);
      showLoginMessage("", true);
      await loadAccounts();
    }

    function logoutAdmin() {
      state.password = "";
      state.accounts = [];
      state.filtered = [];
      state.selected = null;
      state.selectedUserId = "";
      sessionStorage.removeItem(ADMIN_SESSION_KEY);
      setLoggedIn(false);
      el.adminPassword.value = "";
      el.accountsList.innerHTML = "";
      renderAccountDetails();
      showLoginMessage("تم تسجيل خروج المدير.", true);
    }

    el.goEnjazyBtn.addEventListener("click", () => {
      window.location.href = "/enjazy/";
    });
    el.loginBtn.addEventListener("click", async () => {
      showLoginMessage("", true);
      try {
        await runLogin();
      } catch (error) {
        const m = String(error?.message || "");
        if (m.includes("admin_not_configured")) showLoginMessage("ADMIN_PASSWORD غير مضبوط في Vercel.");
        else if (m.includes("endpoint_not_found")) showLoginMessage("مسار API غير موجود في النشر الحالي.");
        else showLoginMessage("فشل تسجيل دخول المدير. تأكد من كلمة المرور.");
      }
    });
    el.searchInput.addEventListener("input", () => {
      state.search = String(el.searchInput.value || "");
      renderAccounts();
    });
    el.refreshBtn.addEventListener("click", async () => {
      try {
        await loadAccounts();
        if (state.selectedUserId) await loadAccount(state.selectedUserId);
      } catch (error) {
        showDetailsMessage("تعذر تحديث القائمة.");
      }
    });
    el.logoutBtn.addEventListener("click", () => {
      const ok = confirm("تأكيد تسجيل خروج المدير؟");
      if (!ok) return;
      logoutAdmin();
    });
    el.saveBtn.addEventListener("click", async () => {
      showDetailsMessage("", true);
      try {
        await saveAccount();
      } catch (error) {
        const m = String(error?.message || "");
        if (m.includes("contact_exists")) showDetailsMessage("البريد مستخدم في حساب آخر.");
        else showDetailsMessage("تعذر حفظ التعديلات.");
      }
    });
    el.deleteBtn.addEventListener("click", async () => {
      showDetailsMessage("", true);
      try {
        await deleteAccount();
      } catch (error) {
        showDetailsMessage("تعذر حذف الحساب.");
      }
    });

    async function init() {
      renderAccountDetails();
      const saved = String(sessionStorage.getItem(ADMIN_SESSION_KEY) || "");
      if (!saved) return;
      state.password = saved;
      el.adminPassword.value = saved;
      try {
        await apiJson("/api/admin?action=accounts", { method: "GET" }, true);
        setLoggedIn(true);
        await loadAccounts();
      } catch (e) {
        sessionStorage.removeItem(ADMIN_SESSION_KEY);
        state.password = "";
      }
    }

    init();
  </script>
</body>
</html>
